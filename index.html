<!doctype html>
<html lang="en">
  <head>
    <script>
      // Apply saved theme before paint to avoid a flash. Default: light.
      (function () {
        try {
          var t = localStorage.getItem('ucin-studio-theme')
          if (t === 'dark') document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UCIN Studio — Your AI production partner</title>
    <meta name="description" content="Hand off your post-production to AI. Upscale, cut out, generate, transcribe and translate thousands of assets in your own signature style — and stay focused on the work only you can do." />
    <meta property="og:title" content="UCIN Studio — Your AI production partner" />
    <meta property="og:description" content="Outsource the post-production. Supercharge your output. Thousands of assets, finished in your style, for a fraction of what you pay today." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>

</html>
